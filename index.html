<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyware Social Replacement</title>
    <meta name="description" content="Cyber Security News and Articles">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="top-nav">
            <div class="nav-brand">
                <i data-lucide="shield-alert" class="brand-icon"></i>
                <h1>Cyber Intel Feed</h1>
            </div>
            <nav class="nav-links">
                <a href="#" class="active">Alerts</a>
            </nav>
            <div class="nav-actions">
                <button class="nav-btn"><i data-lucide="search"></i></button>
                <button class="nav-btn"><i data-lucide="user"></i></button>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Filter by</h3>
                    <ul class="filter-list">
                        <li><a href="#" class="active filter-btn" data-reset="true"><i data-lucide="rss"></i> All Alerts</a></li>
                    </ul>
                </div>
                
                <div class="sidebar-section">
                    <h3>Topics</h3>
                    <ul class="filter-list">
                        <li><a href="#" class="filter-btn" data-category="Threat Intel & Info Sharing">Threat Intel & Info Sharing</a></li>
                        <li><a href="#" class="filter-btn" data-category="Malware and Vulnerabilities">Malware and Vulnerabilities</a></li>
                        <li><a href="#" class="filter-btn" data-category="Breaches and Incidents">Breaches and Incidents</a></li>
                        <li><a href="#" class="filter-btn" data-category="Laws, Policy, Regulations">Laws, Policy, Regulations</a></li>
                    </ul>
                </div>

                <div class="sidebar-section">
                    <h3>Severity</h3>
                    <ul class="filter-list">
                        <li><a href="#" class="filter-btn" data-severity="Critical">Critical</a></li>
                        <li><a href="#" class="filter-btn" data-severity="High">High</a></li>
                        <li><a href="#" class="filter-btn" data-severity="Low">Low</a></li>
                    </ul>
                </div>
            </aside>

            <!-- Main Feed -->
            <main class="feed">
                <div class="feed-header">
                    <h2>Latest Cybersecurity News and Articles</h2>
                    <div class="sort-options">
                        <span>Sort by:</span>
                        <select>
                            <option>Latest</option>
                            <option>Relevance</option>
                        </select>
                    </div>
                </div>

                <div id="articles-container" class="articles-grid">
                    <!-- Articles will be injected here via JavaScript -->
                    <div class="loader">
                        <i data-lucide="loader-2" class="spin"></i> Loading intel...
                    </div>
                </div>
                
                <div class="load-more-container">
                    <button class="btn-load-more">Load More</button>
                </div>
            </main>
        </div>
    </div>

    <!-- Article Template -->
    <template id="article-template">
        <article class="article-card">
            <div class="article-header">
                <span class="source-tag"></span>
                <div style="display: flex; gap: 0.5rem;">
                    <span class="category-tag"></span>
                    <span class="severity-tag"></span>
                </div>
            </div>
            <h3 class="article-title">
                <a href="#" target="_blank" rel="noopener noreferrer" class="article-link"></a>
            </h3>
            <div class="article-summary-container">
                <div class="sparkle-icon"><i data-lucide="sparkles"></i></div>
                <p class="article-summary"></p>
            </div>
            <div class="article-footer">
                <span class="article-date"></span>
                <div class="article-actions">
                    <button class="action-btn" title="Bookmark"><i data-lucide="bookmark"></i></button>
                    <button class="action-btn" title="Share"><i data-lucide="share-2"></i></button>
                    <button class="action-btn" title="Mark as Read"><i data-lucide="check"></i></button>
                </div>
            </div>
        </article>
    </template>

    <script src="app.js"></script>
</body>
</html>
